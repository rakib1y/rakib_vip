<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAKIB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #0a001f 0%, #000000 100%);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Background Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: #00f5ff;
            border-radius: 50%;
            box-shadow: 0 0 12px #00f5ff;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.4); opacity: 0.7; }
            100% { transform: translateY(-100px) scale(1.1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* Logo */
        .logo-container {
            margin-bottom: 50px;
            animation: logoFloat 7s ease-in-out infinite;
        }

        .logo {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            border: 6px solid #00f5ff;
            box-shadow: 
                0 0 40px #00f5ff,
                0 0 80px #c026d3,
                inset 0 0 35px rgba(0, 245, 255, 0.6);
            transition: all 0.4s ease;
        }

        .logo:hover {
            transform: scale(1.07) rotate(5deg);
            box-shadow: 
                0 0 60px #00f5ff,
                0 0 110px #ff00ff;
        }

        /* Main Title */
        .title {
            font-size: 4.8rem;
            font-weight: 900;
            letter-spacing: 10px;
            margin-bottom: 60px;
            background: linear-gradient(90deg, #00f5ff, #c026d3, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 30px #00f5ff,
                0 0 60px #c026d3;
            animation: neonFlicker 2s infinite alternate;
        }

        @keyframes neonFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.85; }
        }

        /* Join Button */
        .join-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(45deg, #229ED9, #1E88E5);
            color: white;
            padding: 16px 42px;
            font-size: 1.35rem;
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 
                0 0 30px rgba(34, 158, 217, 0.9),
                0 0 50px rgba(34, 158, 217, 0.6);
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .join-btn:hover {
            transform: translateY(-6px);
            box-shadow: 
                0 0 45px rgba(34, 158, 217, 1),
                0 0 70px rgba(34, 158, 217, 0.9);
        }

        .join-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -100%;
            width: 50%;
            height: 200%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            20% { transform: translateX(300%); }
            100% { transform: translateX(300%); }
        }

        .telegram-icon {
            font-size: 1.8rem;
        }

        /* Footer */
        .footer {
            margin-top: 70px;
            font-size: 1.05rem;
            color: #94a3b8;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 3.2rem;
                letter-spacing: 6px;
            }
            .logo {
                width: 170px;
                height: 170px;
            }
            .join-btn {
                padding: 14px 35px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Logo -->
        <div class="logo-container">
            <a href="https://t.me/xmlbyrakib" target="_blank">
                <img src="https://i.ibb.co.com/9H5hSBk5/IMG-20260429-221800.png" 
                     alt="RAKIB 9X Logo" 
                     class="logo">
            </a>
        </div>

        <!-- Title -->
        <h1 class="title">RAKIB</h1>

        <!-- Join Button -->
        <a href="https://t.me/xmlbyrakib" target="_blank" class="join-btn">
            <span class="telegram-icon">📬</span>
            JOIN TELEGRAM FOR XML📂
        </a>

        <div class="footer">
            জয়েন বাটনে ক্লিক করে চ্যানেলে জয়েন করুন
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 70; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                particle.style.left = `${Math.random() * 100}vw`;
                particle.style.bottom = `-20px`;
                
                const duration = Math.random() * 20 + 12;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `-${Math.random() * 15}s`;
                
                const opacity = Math.random() * 0.6 + 0.4;
                particle.style.opacity = opacity;
                
                container.appendChild(particle);
                
                setTimeout(() => {
                    if (particle.parentNode) particle.remove();
                }, duration * 1000 + 2000);
            }
        }

        window.onload = () => {
            createParticles();
            setInterval(createParticles, 7000);
        };
    </script>
</body>
</html>
