<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us - চ্যানেল ও গ্রুপ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            padding: 8px;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 15px;
            opacity: 0.9;
            line-height: 1.4;
        }

        .content {
            padding: 40px 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 24px;
            margin-bottom: 20px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .youtube-btn {
            background: #ff0000;
            color: white;
        }

        .youtube-btn:hover {
            background: #e60000;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.4);
        }

        .telegram-btn {
            background: linear-gradient(135deg, #229ED9, #1a8ac4);
            color: white;
        }

        .telegram-btn:hover {
            background: linear-gradient(135deg, #1a8ac4, #1678a8);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(34, 158, 217, 0.4);
        }

        .icon {
            font-size: 28px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            opacity: 0.7;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header with Logo -->
        <div class="header">
            <div class="logo" id="logoContainer">
                <!-- ✅ ঠিক করা লোগো -->
                <img src="https://i.ibb.co/99PxKt3w/1778737849165.png" 
                     alt="XT Rakib Logo">
            </div>
            <h1>✯Ӽ𝐓 𝕽𝐀𝐊𝐈𝐁✯</h1>
            <p>সকল🆇🅼🅻নিচের চ্যানেল গুলোতে পাবেন।এই লিংকটি𝐂𝐑𝐎𝐌𝐄ব্রাউজারে ওপেন করুন।</p>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- YouTube Button -->
            <a href="https://youtube.com/@xtrakib-9?si=v7WE2XxrDNbr1VLy" 
               target="_blank" 
               class="btn youtube-btn" 
               id="youtubeLink">
                <i class="fab fa-youtube icon"></i>
                <span>᪥𝐒𝐔𝐁𝐒𝐂𝐑𝐈𝐁𝐄 𝐍𝐎𝐖</span>
            </a>

            <!-- Telegram Button -->
            <a href="https://t.me/xtrakib9" 
               target="_blank" 
               class="btn telegram-btn" 
               id="telegramLink">
                <i class="fab fa-telegram-plane icon"></i>
                <span>᪥𝐉𝐎𝐈𝐍𝐄 𝐍𝐎𝐖 𝐓𝐆</span>
            </a>

            <div class="social-icons">
                <i class="fab fa-youtube" style="font-size: 28px; color: #ff0000;"></i>
                <i class="fab fa-telegram" style="font-size: 28px; color: #229ED9;"></i>
            </div>
        </div>

        <div class="footer">
            © 2026 |✯𝐗𝐓 𝐑𝐀𝐊𝐈𝐁✯|
        </div>
    </div>

    <script>
        // লোগো পরিবর্তন করার জন্য ফাংশন (পরে প্রয়োজন হলে ব্যবহার করতে পারবেন)
        function updateLogo(imageUrl) {
            document.querySelector('#logoContainer img').src = imageUrl;
        }
    </script>

</body>
</html>
