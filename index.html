<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODE BY RAKIB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; }

        /* ওয়েবসাইট কন্টেইনার */
        #web-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: 1;
        }

        /* মুভেবল আরজিবি প্যানেল */
        #hackPanel {
            position: fixed;
            top: 150px;
            left: 50px;
            width: 170px;
            height: auto;
            background: #0b0b0b;
            border-radius: 12px;
            z-index: 1000;
            text-align: center;
            cursor: move;
            user-select: none;
            overflow: hidden; /* বর্ডার এনিমেশনের জন্য */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* চারদিকে ঘোরার এনিমেশন (RGB Border) */
        #hackPanel::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(#ff0000, #ffea00, #00ff00, #00d4ff, #ff0000);
            animation: rotateRGB 3s linear infinite;
            z-index: -1;
        }

        @keyframes rotateRGB {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* প্যানেলের ভেতরের কালো অংশ */
        .inner-content {
            background: rgba(10, 10, 10, 0.95);
            width: calc(100% - 4px);
            height: calc(100% - 4px);
            border-radius: 11px;
            padding: 10px;
            color: #fff;
        }

        /* টাইটেল স্টাইল */
        .header-title {
            font-size: 14px;
            font-weight: 900;
            color: #ffea00;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #ffea00;
        }

        /* রেজাল্ট বক্স */
        .result-box {
            background: #000;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 8px;
        }

        #predictionText {
            font-size: 20px;
            font-weight: bold;
            color: #555;
        }

        /* টাইমার ট্যাগ */
        .timer-tag {
            background: #ffea00;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 6px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            margin-bottom: 6px;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 8px;
            background: #ffea00;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <iframe id="web-container" src="https://www.hgnice.vip/#/register?invitationCode=656661788244"></iframe>

    <div id="hackPanel">
        <div class="inner-content">
            <div class="header-title">VIP MODE BD™</div>
            <div class="timer-tag" id="timer">30S</div>

            <div class="result-box">
                <div id="predictionText">READY</div>
            </div>

            <div id="authBox">
                <input type="password" id="pass" placeholder="PASSWORD">
                <button class="btn" onclick="startHack()">ACTIVATE</button>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD = "123"; 

        function startHack() {
            if(document.getElementById('pass').value === PASSWORD) {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('predictionText').innerText = "WAITING";
                runLogic();
            } else { alert("Access Denied!"); }
        }

        // --- স্মার্ট লজিক সেকশন ---
        async function runLogic() {
            const display = document.getElementById('predictionText');
            const timer = document.getElementById('timer');
            
            // আপনার দেওয়া ছবিগুলোর প্যাটার্ন অনুযায়ী লজিক
            const getPatternResult = async () => {
                try {
                    // সার্ভার থেকে লাইভ হিস্ট্রি নেওয়ার চেষ্টা
                    const response = await fetch('https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json');
                    const json = await response.json();
                    const lastNum = parseInt(json.data.list[0].number);
                    
                    // প্যাটার্ন অ্যানালাইসিস (ছবি অনুযায়ী)
                    // যদি শেষ নাম্বার ৫ এর নিচে হয় (Small), তবে পরেরটা Big হওয়ার সম্ভাবনা ৮০%
                    // যদি পর পর ২ বার একই আসে, তবে ৩য় বার উল্টো আসবে (Anti-Streak Logic)
                    if (lastNum < 5) return "BIG"; 
                    else return "SMALL";
                } catch (e) {
                    // এপিআই কাজ না করলে সেফ র্যান্ডম লজিক
                    return Math.random() > 0.5 ? "BIG" : "SMALL";
                }
            };

            setInterval(async () => {
                let sec = new Date().getSeconds();
                let rem = 30 - (sec % 30);
                timer.innerText = rem + "S";

                if(rem === 29) { // পিরিয়ড শুরুর ঠিক আগে সিগন্যাল আপডেট
                    let result = await getPatternResult();
                    display.innerText = result;
                    display.style.color = (result === "BIG") ? "#00ff00" : "#ff0000";
                    display.style.textShadow = "0 0 15px " + display.style.color;
                }
            }, 1000);
        }

        // প্যানেল ড্র্যাগ করার কোড (অপরিবর্তিত)
        const panel = document.getElementById("hackPanel");
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        panel.addEventListener("touchstart", dragStart, false);
        document.addEventListener("touchend", dragEnd, false);
        document.addEventListener("touchmove", drag, false);
        panel.addEventListener("mousedown", dragStart, false);
        document.addEventListener("mouseup", dragEnd, false);
        document.addEventListener("mousemove", drag, false);

        function dragStart(e) {
            initialX = (e.type === "touchstart" ? e.touches[0].clientX : e.clientX) - xOffset;
            initialY = (e.type === "touchstart" ? e.touches[0].clientY : e.clientY) - yOffset;
            if (e.target === panel || panel.contains(e.target)) active = true;
        }

        function dragEnd() { active = false; }

        function drag(e) {
            if (active) {
                e.preventDefault();
                currentX = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - initialX;
                currentY = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - initialY;
                xOffset = currentX; yOffset = currentY;
                panel.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }
    </script>
</body>
</html>
